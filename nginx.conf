# nginx配置文件
worker_processes 1;
pid /tmp/nginx.pid;

# 错误日志
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # 访问日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 后端API服务（FastAPI运行在8000端口）
    upstream backend {
        server 127.0.0.1:8000;
    }

    server {
        listen 7860;
        server_name localhost;

        # 静态文件缓存设置 - 匹配所有常见静态文件类型
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot|otf|mp4|webm|ogg|mp3|wav|flac|aac|pdf|txt|xml|json|wasm)$ {
            root /app/frontend/dist;
            expires 1y;
            add_header Cache-Control "public, immutable";

            # 安全头部
            add_header X-Content-Type-Options "nosniff";
            add_header X-Frame-Options "SAMEORIGIN";

            # 尝试文件，如果不存在则返回404而不是fallback到index.html
            try_files $uri =404;
        }

        # API路由 - 代理到FastAPI后端
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            # 处理SSE（Server-Sent Events）
            proxy_buffering off;
            proxy_cache off;
        }

        # SSE端点特殊处理
        location /api/sse/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE 核心配置
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            
            # 禁用 Nginx 缓存
            add_header Cache-Control "no-cache";
            add_header X-Accel-Buffering "no";
        }

        # 健康检查端点
        location /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 根路径和前端路由 - 服务前端静态文件
        location / {
            root /app/frontend/dist;
            try_files $uri $uri/ /index.html;
            index index.html;

            # 安全头部
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;

            # 对HTML文件禁用缓存
            if ($request_filename ~* \.html$) {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma "no-cache";
                add_header Expires "0";
            }
        }

        # 错误页面
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}